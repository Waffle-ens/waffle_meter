# .NET / WPF + Velopack release (the v2.0 build — supersedes the Kotlin MSI release.yml, whose tag
# trigger is retired so a `x.y.z` tag only builds THIS). Triggered by a version tag OR manual dispatch.
#
# CODE SIGNING — SignPath.io OSS (free for public MIT projects):
#   Signing is OPTIONAL and gated on the repo VARIABLE `SIGNPATH_ORG_ID`. Until it is set the release
#   ships UNSIGNED (still works; first-install SmartScreen + AV friction). To enable signing:
#     1. Get the project approved at https://signpath.org/opensource and create, in the SignPath dashboard:
#        - a Project           (slug must match SIGNPATH_PROJECT_SLUG below: `waffle_meter`)
#        - a Signing Policy     (slug must match SIGNPATH_POLICY_SLUG below: `release-signing`)
#        - two Artifact Configurations:
#            * `app-binaries` — sign the app's OWN code only: WaffleMeter.*.exe + WaffleMeter.*.dll
#              (NOT the .NET runtime dlls, NOT WinDivert.* which its author already signs)
#            * `installer`    — sign the Velopack output: *Setup.exe (+ Update.exe if present)
#     2. Repo → Settings:
#        - Variable  `SIGNPATH_ORG_ID`    = your SignPath organization GUID
#        - Secret    `SIGNPATH_API_TOKEN` = a SignPath CI user API token
#   Pass 1 signs the binaries BEFORE `vpk pack` (so the installed app + helper, and every in-app-updated
#   file, are signed). Pass 2 signs the generated Setup.exe (the first-download SmartScreen hurdle).
name: release-dotnet

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (x.y.z) — ignored on a tag push (uses the tag)"
        required: false
      channel:
        description: "win (release) or dev"
        required: true
        default: win

permissions:
  contents: write
  id-token: write   # OIDC (kept for any future cloud signer)

jobs:
  release:
    runs-on: windows-latest
    env:
      # secrets/vars can't be referenced in step-level `if:`, so surface the signing gate as an env flag.
      SIGN_ENABLED: ${{ vars.SIGNPATH_ORG_ID != '' }}
      # Anti-analysis obfuscation gate (OFF until repo VARIABLE `OBFUSCATE` = 'true'). Kept off by default
      # so it can't silently break a release; enable + test before relying on it (docs/replay-feature-plan.md §7).
      OBFUSCATE_ENABLED: ${{ vars.OBFUSCATE == 'true' }}
      SIGNPATH_PROJECT_SLUG: waffle_meter
      SIGNPATH_POLICY_SLUG: release-signing
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + channel
        shell: pwsh
        run: |
          # On a tag push the version comes from the tag (github.ref_name); on dispatch from the input.
          $v = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($v)) { $v = "${{ github.ref_name }}" }
          $v = $v.TrimStart('v')
          if ($v -notmatch '^\d+\.\d+\.\d+$') { throw "version must be x.y.z (got '$v')" }
          $channel = "${{ github.event.inputs.channel }}"
          if ([string]::IsNullOrWhiteSpace($channel)) { $channel = "win" }
          $packId = if ($channel -eq "dev") { "waffle_meter-dev" } else { "waffle_meter" }
          "VERSION=$v"      | Out-File -FilePath $env:GITHUB_ENV -Append
          "CHANNEL=$channel" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PACK_ID=$packId"  | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install vpk
        run: dotnet tool install -g vpk

      # Both exes publish into the SAME folder so CaptureHost.exe + WinDivert + json sit beside the UI.
      # Release hardening: ship no PDBs and no +gitSHA InformationalVersion suffix (decompilation hygiene,
      # docs/replay-feature-plan.md §7). Affects only the shipped artifacts, not local/test builds.
      - name: Publish WPF app
        run: dotnet publish dotnet/src/WaffleMeter.App.Wpf/WaffleMeter.App.Wpf.csproj -c Release -r win-x64 --self-contained true -p:WaffleVersion=${{ env.VERSION }} -p:DebugType=none -p:DebugSymbols=false -p:IncludeSourceRevisionInInformationalVersion=false -o publish

      - name: Publish capture helper (into the same folder)
        run: dotnet publish dotnet/tools/WaffleMeter.CaptureHost/WaffleMeter.CaptureHost.csproj -c Release -r win-x64 --self-contained true -p:WaffleVersion=${{ env.VERSION }} -p:DebugType=none -p:DebugSymbols=false -p:IncludeSourceRevisionInInformationalVersion=false -o publish

      # ---- Inject the PRIVATE replay engine DLL into publish/ (before obfuscate/sign/pack).
      # The engine (0x37xx decode + reconstruction — the reverse-engineered secret) is NOT referenced by
      # the app at compile time; it is discovered at runtime by ReplayEngineLoader. The source lives in the
      # private waffle_meter_replay repo; here we clone it as a SIBLING of this checkout (its csproj
      # references the public assemblies via ../../../../waffle_meter, so sibling layout is required),
      # build the engine, and drop the DLL into publish/. Without the token (e.g. a fork) the step skips and
      # the release ships without replay. Placed before obfuscate/sign so the engine DLL is hardened + signed.
      - name: Inject replay engine (private module)
        shell: pwsh
        env:
          REPLAY_REPO_TOKEN: ${{ secrets.REPLAY_REPO_TOKEN }}
          REPLAY_REPO: ${{ github.repository_owner }}/waffle_meter_replay
        run: |
          if (-not $env:REPLAY_REPO_TOKEN) {
            Write-Host "::warning::REPLAY_REPO_TOKEN not set — this release ships WITHOUT replay"
            exit 0
          }
          # Clone the private engine as a sibling of this checkout so its ../../../../waffle_meter refs resolve.
          $sibling = Join-Path (Split-Path $env:GITHUB_WORKSPACE -Parent) "waffle_meter_replay"
          Write-Host "cloning private replay engine $env:REPLAY_REPO -> $sibling"
          git clone --depth 1 "https://x-access-token:$($env:REPLAY_REPO_TOKEN)@github.com/$($env:REPLAY_REPO).git" "$sibling"
          $proj = Join-Path $sibling "dotnet/src/WaffleMeter.Replay/WaffleMeter.Replay.csproj"
          dotnet publish $proj -c Release -p:WaffleVersion=${{ env.VERSION }} -p:DebugType=none -p:DebugSymbols=false -p:IncludeSourceRevisionInInformationalVersion=false -o _engine_out
          Copy-Item _engine_out/WaffleMeter.Replay.dll publish/ -Force
          Write-Host "replay engine injected -> publish/WaffleMeter.Replay.dll"

      # ---- Anti-analysis: obfuscate the rename-safe app DLLs in publish/ before signing/packing.
      # OFF by default (env gate above); never touches App.Wpf (BAML) or the Stats JSON DTOs (see config). ----
      - name: Obfuscate app assemblies (Obfuscar)
        if: env.OBFUSCATE_ENABLED == 'true'
        run: |
          dotnet tool install -g Obfuscar.GlobalTool
          obfuscar.console .github/obfuscar.xml

      # WinDivert.dll/.sys come from dotnet/third-party/windivert via CaptureHost.csproj (bundled on publish).

      # ---- Pass 1: sign the app's OWN binaries BEFORE packing (SignPath OSS; no-op until configured) ----
      - name: Upload unsigned binaries (for signing)
        id: upload-binaries
        if: env.SIGN_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-binaries
          path: publish/

      - name: Sign app binaries (SignPath)
        if: env.SIGN_ENABLED == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_POLICY_SLUG }}
          artifact-configuration-slug: app-binaries
          github-artifact-id: ${{ steps.upload-binaries.outputs.artifact-id }}
          wait-for-completion: true
          # Overwrite publish/ with the signed binaries so vpk packs the SIGNED files.
          output-artifact-directory: publish

      - name: Download previous release (for delta)
        continue-on-error: true
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --channel ${{ env.CHANNEL }} --token ${{ secrets.GITHUB_TOKEN }}

      # RELEASE_NOTES.md (markdown) is embedded by --releaseNotes; `vpk upload github` then uses it as the
      # GitHub Release body, so each release page shows its patch notes (like the old Kotlin releases did).
      - name: Pack
        run: >
          vpk pack
          --packId ${{ env.PACK_ID }}
          --packVersion ${{ env.VERSION }}
          --packDir publish
          --mainExe WaffleMeter.App.Wpf.exe
          --packTitle "waffle_meter"
          --packAuthors "TK"
          --outputDir Releases
          --icon dotnet/Assets/waffle.ico
          --channel ${{ env.CHANNEL }}
          --releaseNotes RELEASE_NOTES.md

      # ---- Pass 2: sign the generated Setup.exe AFTER packing (first-download SmartScreen) ----
      - name: Upload unsigned installer (for signing)
        id: upload-installer
        if: env.SIGN_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: Releases/

      - name: Sign installer (SignPath)
        if: env.SIGN_ENABLED == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_POLICY_SLUG }}
          artifact-configuration-slug: installer
          github-artifact-id: ${{ steps.upload-installer.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: Releases

      - name: Upload release
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --outputDir Releases
          --channel ${{ env.CHANNEL }}
          --publish --releaseName ${{ env.VERSION }} --tag ${{ env.VERSION }}
          --token ${{ secrets.GITHUB_TOKEN }}
