name: Release MSI

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-msi:
    name: Build and publish MSI
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: release
        shell: pwsh
        run: |
          $rawVersion = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "${{ inputs.version }}"
          } else {
            "${{ github.ref_name }}"
          }

          $rawVersion = $rawVersion.Trim()
          $version = $rawVersion -replace '^[vV]', ''
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release version must use x.y.z format. Received: $rawVersion"
          }

          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "v$version"
          } else {
            $rawVersion
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/main/resources/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build MSI
        shell: pwsh
        run: .\gradlew.bat --no-daemon "-PappVersion=${{ steps.release.outputs.version }}" packageDistributionForCurrentOS

      - name: Prepare MSI asset
        id: asset
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "build/compose/binaries/main/msi" -Filter "*.msi" -Recurse | Select-Object -First 1
          if (-not $msi) {
            throw "MSI output was not found."
          }

          $assetName = "waffle_meter-${{ steps.release.outputs.version }}.msi"
          $assetPath = Join-Path $msi.DirectoryName $assetName
          if ($msi.FullName -ne $assetPath) {
            Copy-Item -LiteralPath $msi.FullName -Destination $assetPath -Force
          }

          "path=$assetPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          $asset = "${{ steps.asset.outputs.path }}"
          $title = "${{ steps.release.outputs.version }}"
          $notes = "waffle_meter $title"

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $tag $asset --repo $env:GITHUB_REPOSITORY --title $title --notes $notes --target $env:GITHUB_SHA
          }
